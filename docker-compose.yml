services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: orac
      POSTGRES_PASSWORD: orac
      POSTGRES_DB: orac
    ports:
      - '5432:5432'
    volumes:
      - OracPostgresData:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U orac']
      interval: 10s
      timeout: 5s
      retries: 5

  rustfs:
    image: rustfs/rustfs:latest
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      RUSTFS_ADDRESS: ':9000'
      RUSTFS_CONSOLE_ADDRESS: ':9001'
      RUSTFS_CONSOLE_ENABLE: 'true'
      RUSTFS_ACCESS_KEY: rustfsadmin
      RUSTFS_SECRET_KEY: rustfsadmin
    volumes:
      - OracRustFsData:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/health']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  OracPostgresData:
  OracRustFsData:
